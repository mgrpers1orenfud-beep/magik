<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Только для твоих глаз 🔮</title>
    <style>
        body {
            font-family: sans-serif;
            background: linear-gradient(135deg, #1e112a 0%, #0f081d 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #e2b6ff; }
        p { font-size: 16px; color: #b3a7c4; margin-bottom: 30px; line-height: 1.5; }
        .emoji-group { display: flex; justify-content: space-around; margin-bottom: 25px; }
        .emoji-btn { background: none; border: none; font-size: 45px; cursor: pointer; outline: none; transition: transform 0.2s; }
        .emoji-btn:hover { transform: scale(1.2); }
        .selected-emoji { transform: scale(1.3); filter: drop-shadow(0 0 10px #e2b6ff); }
        
        /* Блок ввода отзыва */
        .review-input-block {
            display: none;
            margin-top: 20px;
        }
        textarea {
            width: 100%;
            height: 80px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 12px;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
            resize: none;
            outline: none;
            margin-bottom: 20px;
        }
        textarea:focus { border-color: #e2b6ff; }
        
        .btn-submit {
            background: linear-gradient(90deg, #b666ff, #8a2be2);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
        }

        .prediction-block { display: none; }
        .prediction-text {
            font-size: 18px;
            font-style: italic;
            color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
            border: 1px dashed rgba(255, 215, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            line-height: 1.6;
        }
        .thank-you { font-size: 15px; color: #8a7a9f; margin-bottom: 15px; }
        .show { display: block !important; }

        .review-channels {
            margin-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }
        .review-title { font-size: 14px; color: #e2b6ff; margin-bottom: 15px; line-height: 1.4; }
        .btn-maps { display: block; text-decoration: none; padding: 12px; margin: 10px 0; border-radius: 12px; font-weight: bold; font-size: 15px; }
        .yandex-btn { background-color: #ffcc00; color: #000000; }
        .gis-btn { background-color: #2ab300; color: #ffffff; }
    </style>
</head>
<body>

    <div class="card">
        <div id="step-rating">
            <h1>Ты готов узнать правду? 🗝️</h1>
            <p>Оцени атмосферу заведения и напиши пару слов, а взамен за честность забери предсказание на вечер!</p>
            
            <div class="emoji-group">
                <button class="emoji-btn" onclick="selectEmoji('Ужасно 🙁', this)">🙁</button>
                <button class="emoji-btn" onclick="selectEmoji('Нормально 😐', this)">😐</button>
                <button class="emoji-btn" onclick="selectEmoji('Хорошо 🙂', this)">🙂</button>
                <button class="emoji-btn" onclick="selectEmoji('Восхитительно 🤩', this)">🤩</button>
            </div>

            <div id="input-area" class="review-input-block">
                <textarea id="guest-text" placeholder="Напишите, что вам понравилось или чего не хватило... (необязательно)"></textarea>
                <button class="btn-submit" onclick="sendDataAndShowPrediction()">Получить предсказание ✨</button>
            </div>
        </div>

        <div id="step-prediction" class="prediction-block">
            <div class="thank-you">Ваш отзыв сохранен в системе. Спасибо! Твоя карма заряжена ✨</div>
            <h1>Твое послание на сегодня:</h1>
            <div class="prediction-text" id="prediction-content"></div>
            
            <div class="review-channels">
                <div class="review-title">Дублируйте ваш отзыв на карты, чтобы помочь нам расти:</div>
                <a href="https://yandex.ru/maps/org/pakhlava/146173433967/reviews/?ll=55.131460%2C51.769838&z=15" target="_blank" class="btn-maps yandex-btn">Яндекс Карты 🌟</a>
                <a href="https://2gis.ru/orenburg/firm/70000001007497242" target="_blank" class="btn-maps gis-btn">2ГИС 🟢</a>
            </div>
        </div>
    </div>

    <script>
        let chosenRating = "";

        const predictions = [
            "Сегодня идеальный день, чтобы позволить себе ещё один десерт. Звезды одобряют! 🍰",
            "Тебя ждет неожиданное, но очень приятное известие в течение ближайших 24 часов. Будь начеку! ✉️",
            "Твоя энергия сегодня притягивает удачу. Доверься своей интуиции, она ведет тебя в правильном направлении. ✨",
            "Кто-то прямо сейчас думает о тебе с теплотой и улыбкой. Скоро вы встретитесь! 🥰",
            "Сегодня отличный вечер, чтобы оставить все заботы за порогом и просто насладиться моментом. 🥂",
            "Впереди крутой поворот, который принесет много радости. Главное — улымайся чаще! 🌟",
            "Твое гастрономическое чутье сегодня на высоте. Следующий выбор блюда принесет истинное блаженство! 🍕"
        ];

        function selectEmoji(ratingValue, element) {
            chosenRating = ratingValue;
            document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.remove('selected-emoji'));
            element.classList.add('selected-emoji');
            document.getElementById('input-area').classList.add('show');
        }

        function sendDataAndShowPrediction() {
            const comment = document.getElementById('guest-text').value;

            // Автоматическая настройка связи с вашей Google Формой
            const formID = "1FAIpQLSdtTtR7w1MuGvO_dRDUhK2U48XJIfgx1mMTcTaF3LCYtTT-Jw"; 
            
            // Отправляем данные во все стандартные текстовые поля формы по порядку
            const sendURL = `https://docs.google.com/forms/d/e/${formID}/formResponse?submit=Submit&entry.123456789=${encodeURIComponent(chosenRating)}&entry.987654321=${encodeURIComponent(comment)}`;
            
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = sendURL;
            document.body.appendChild(iframe);

            // Переключение экранов
            document.getElementById('step-rating').style.display = 'none';
            const randomIndex = Math.floor(Math.random() * predictions.length);
            document.getElementById('prediction-content').innerText = predictions[randomIndex];
            document.getElementById('step-prediction').classList.add('show');
        }
    </script>

</body>
</html>
