<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Только для твоих глаз 🔮</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            background-color: #f6fc9a; /* Ваш цвет фона */
            position: relative;
            overflow-x: hidden;
        }

        /* Фоновый узор из еды и вина */
        body::before {
            content: "🍕 🍝 🥖 🍷 🍕 🍝 🥖 🍷 🍕 🍝 🥖 🍷 🍕 🍝 🥖 🍷 🍕 🍝 🥖 🍷";
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            z-index: -1;
            opacity: 0.15; /* Еле заметные */
            font-size: 80px;
            letter-spacing: 50px;
            line-height: 150px;
            transform: rotate(-5deg);
            pointer-events: none;
            word-break: break-all;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            z-index: 1;
        }

        /* Остальные стили прежние */
        h1 { font-size: 24px; margin-bottom: 10px; color: #2d2d2d; }
        p { font-size: 16px; color: #555; margin-bottom: 30px; line-height: 1.5; }
        .emoji-group { display: flex; justify-content: space-around; margin-bottom: 25px; }
        .emoji-btn { background: none; border: none; font-size: 45px; cursor: pointer; transition: transform 0.2s; }
        .emoji-btn:hover { transform: scale(1.2); }
        
        .prediction-block { display: none; }
        .prediction-text {
            font-size: 18px; font-style: italic; color: #7a6600;
            background: rgba(255, 255, 255, 0.5);
            border: 1px dashed #ffd700; border-radius: 16px;
            padding: 20px; margin: 20px 0 25px 0; line-height: 1.6;
        }
        .thank-you { font-size: 15px; color: #777; margin-bottom: 15px; }
        .show { display: block !important; }

        .review-channels { margin-top: 25px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 20px; }
        .review-title { font-size: 15px; color: #333; margin-bottom: 15px; font-weight: bold; }
        
        .btn-maps { display: block; text-decoration: none; padding: 12px; margin: 10px 0; border-radius: 12px; font-weight: bold; font-size: 15px; transition: background 0.3s; text-align: center; }
        .yandex-btn { background-color: #ffcc00; color: #000; }
        .gis-btn { background-color: #2ab300; color: #fff; }

        .site-review-form { background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.05); border-radius: 16px; padding: 15px; margin-bottom: 15px; text-align: left; }
        textarea { width: 100%; height: 70px; background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 10px; color: #333; box-sizing: border-box; resize: none; outline: none; margin-bottom: 10px; }
        .btn-submit { background: #2d2d2d; color: #fff; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }

        #negative-contact { display: none; margin-top: 20px; padding: 15px; background: rgba(255, 80, 80, 0.05); border-radius: 16px; border-left: 4px solid #ff5555; text-align: left; }
        #negative-contact a { color: #cc0000; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <!-- (Здесь сохраняется ваша структура HTML и скрипт из предыдущих шагов) -->
</body>
</html>
