<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Только для твоих глаз 🔮</title>
    <style>
        body {
            font-family: sans-serif;
            background: linear-gradient(135deg, #1e112a 0%, #0f081d 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #e2b6ff; }
        p { font-size: 16px; color: #b3a7c4; margin-bottom: 30px; line-height: 1.5; }
        .emoji-group { display: flex; justify-content: space-around; margin-bottom: 25px; }
        .emoji-btn { background: none; border: none; font-size: 45px; cursor: pointer; outline: none; transition: transform 0.2s; }
        .emoji-btn:hover { transform: scale(1.2); }
        
        .prediction-block { display: none; }
        .prediction-text {
            font-size: 18px;
            font-style: italic;
            color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
            border: 1px dashed rgba(255, 215, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0 25px 0;
            line-height: 1.6;
        }
        .thank-you { font-size: 15px; color: #8a7a9f; margin-bottom: 15px; }
        .show { display: block !important; }

        .review-channels {
            margin-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }
        .review-title { font-size: 15px; color: #e2b6ff; margin-bottom: 15px; line-height: 1.4; font-weight: bold; }
        
        .btn-maps { display: block; text-decoration: none; padding: 12px; margin: 10px 0; border-radius: 12px; font-weight: bold; font-size: 15px; transition: background 0.3s; text-align: center; }
        .yandex-btn { background-color: #ffcc00; color: #000000; }
        .yandex-btn:hover { background-color: #e6b800; }
        .gis-btn { background-color: #2ab300; color: #ffffff; }
        .gis-btn:hover { background-color: #229200; }

        .site-review-form {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
        }
        .site-review-form label { font-size: 13px; color: #b3a7c4; display: block; margin-bottom: 8px; text-align: center; font-weight: bold; }
        textarea {
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 10px;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
            resize: none;
            outline: none;
            margin-bottom: 10px;
        }
        textarea:focus { border-color: #e2b6ff; }
        .btn-submit {
            background: linear-gradient(90deg, #b666ff, #8a2be2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(138, 43, 226, 0.3);
        }
    </style>
</head>
<body>

    <iframe name="hidden-submit" id="hidden-submit" style="display:none;"></iframe>
    <form id="google-form" action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSfvjUCBC27T87P_AUAHDjBenJGKOzSDl_iUtxhrXHD-4ClDdQ/formResponse" method="POST" target="hidden-submit" style="display:none;">
        <input type="text" id="field-rating" name="entry.1741541300" value="">
        <textarea id="field-comment" name="entry.1391125119_sentinel"></textarea>
    </form>

    <div class="card">
        <div id="step-rating">
            <h1>Ты готов узнать правду? 🗝️</h1>
            <p>Мы подготовили для тебя секретное послание на этот evening. Поделись своим настроением от визита, чтобы открыть его:</p>
            
            <div class="emoji-group">
                <button class="emoji-btn" onclick="selectRating('Ужасно')">🙁</button>
                <button class="emoji-btn" onclick="selectRating('Нормально')">😐</button>
                <button class="emoji-btn" onclick="selectRating('Хорошо')">🙂</button>
                <button class="emoji-btn" onclick="selectRating('Восхитительно')">🤩</button>
            </div>
        </div>

        <div id="step-prediction" class="prediction-block">
            <div class="thank-you">Твоя карма заряжена ✨ Твое послание:</div>
            <div class="prediction-text" id="prediction-content"></div>
            
            <div class="review-channels">
                <div class="review-title">Где бы ты хотел оставить свой отзыв?</div>
                
                <div class="site-review-form" id="form-container">
                    <label>📝 Вариант 1: Написать нам прямо тут</label>
                    <textarea id="guest-text" placeholder="Напишите честно, что вам понравилось или как нам стать лучше..."></textarea>
                    <button class="btn-submit" onclick="sendTextComment()">Отправить отзыв в систему</button>
                </div>

                <a href="https://yandex.ru/maps/org/pakhlava/146173433967/reviews/?ll=55.131460%2C51.769838&z=15" target="_blank" class="btn-maps yandex-btn" onclick="sendOnlyRating('Ушел в Яндекс Карты')">💛 Вариант 2: Яндекс Карты</a>
                
                <a href="https://2gis.ru/orenburg/firm/70000001007497242" target="_blank" class="btn-maps gis-btn" onclick="sendOnlyRating('Ушел в 2ГИС')">💚 Вариант 3: Отзыв в 2ГИС</a>
            </div>
        </div>
    </div>

    <script>
        let chosenRating = "";

        const predictions = [
            "Сегодня идеальный день, чтобы позволить себе ещё один десерт. Звезды одобряют! 🍰",
            "Тебя ждет неожиданное, но очень приятное известие в течение ближайших 24 часов. Будь начеку! ✉️",
            "Твоя энергия сегодня притягивает удачу. Доверься своей интуиции, она ведет тебя в правильном направлении. ✨",
            "Кто-то прямо сейчас думает о тебе с теплотой и улыбкой. Скоро вы встретитесь! 🥰",
            "Сегодня отличный вечер, чтобы оставить все заботы за порогом и просто насладиться моментом. 🥂",
            "Впереди крутой поворот, который принесет много радости. Главное — улымайся чаще! 🌟",
            "Твое гастрономическое чутье сегодня на высоте. Следующий выбор блюда принесет истинное блаженство! 🍕"
        ];

        function selectRating(ratingValue) {
            chosenRating = ratingValue;
            
            document.getElementById('field-rating').value = chosenRating;
            document.getElementById('field-comment').value = "Пока читает предсказание";
            document.getElementById('google-form').submit();

            document.getElementById('step-rating').style.display = 'none';
            const randomIndex = Math.floor(Math.random() * predictions.length);
            document.getElementById('prediction-content').innerText = predictions[randomIndex];
            document.getElementById('step-prediction').classList.add('show');
        }

        function sendTextComment() {
            const comment = document.getElementById('guest-text').value || "Оставил пустой отзыв";
            
            document.getElementById('field-rating').value = chosenRating;
            document.getElementById('field-comment').value = comment;
            document.getElementById('google-form').submit();

            document.getElementById('form-container').innerHTML = "<div style='text-align:center; color:#ffd700; font-size:14px; padding:10px; font-weight:bold;'>✔️ Отзыв успешно сохранен! Спасибо!</div>";
        }

        function sendOnlyRating(destination) {
            document.getElementById('field-rating').value = chosenRating;
            document.getElementById('field-comment').value = destination;
            document.getElementById('google-form').submit();
        }
    </script>

</body>
</html>
